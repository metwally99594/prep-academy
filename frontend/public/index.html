      *{margin:0;padding:0;box-sizing:border-box}
      body{font-family:'Manrope',system-ui,sans-serif;background:#06081a}
      #loading-screen{position:fixed;inset:0;background:linear-gradient(135deg,#06081a,#0c1229,#06081a);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s}
      #loading-screen.hide{opacity:0;pointer-events:none}
      .loading-logo{width:80px;height:80px;object-fit:contain;margin-bottom:20px}
      .spinner{width:32px;height:32px;border:2px solid rgba(201,168,76,.15);border-top-color:#c9a84c;border-radius:50%;animation:spin .7s linear infinite;margin-top:16px}
      .logo-text{color:#c9a84c;font-size:18px;font-weight:600;font-family:'Playfair Display',serif;letter-spacing:0.05em}

  <body class="notranslate">
    <div id="loading-screen">
      <img src="%PUBLIC_URL%/logo-elite.png" alt="PrepAcademy" class="loading-logo" />
      <div class="logo-text">PrepAcademy Elite</div>
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script>
      var observer = new MutationObserver(function(m) {
        if (document.getElementById('root').children.length > 0) {
          var ls = document.getElementById('loading-screen');
          if (ls) { ls.classList.add('hide'); setTimeout(function(){ ls.remove(); }, 300); }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
      setTimeout(function(){ var ls = document.getElementById('loading-screen'); if(ls) ls.classList.add('hide'); }, 3000);
    </script>
    <script>
      // Remove stale service workers
      (function() {
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          var hadSW = regs && regs.length > 0;
          Promise.all((regs || []).map(function(r) { return r.unregister(); })).then(function() {
            if (window.caches) {
              caches.keys().then(function(keys) {
                Promise.all(keys.map(function(k) { return caches.delete(k); })).then(function() {
                  if (hadSW && !sessionStorage.getItem('__sw_nuked')) {
                    sessionStorage.setItem('__sw_nuked', '1');
                    window.location.reload();
                  }
                });
              });
            }
          });
        }).catch(function(){});
      })();
    </script>
  </body>
